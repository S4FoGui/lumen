  <path d="M38 62 C38 82, 64 96, 64 96 C64 96, 90 82, 90 62" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="96" x2="64" y2="106" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="106" x2="78" y2="106" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Sound waves -->
  <path d="M32 50 C28 58, 28 70, 32 78" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M24 44 C18 56, 18 72, 24 84" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M96 50 C100 58, 100 70, 96 78" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M104 44 C110 56, 110 72, 104 84" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
